<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBITAL — Account Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #050810;
      --surface:   #0a0f1e;
      --panel:     #0d1526;
      --border:    #1a2a4a;
      --accent:    #00d4ff;
      --accent2:   #ff4500;
      --green:     #00ff88;
      --yellow:    #ffd700;
      --muted:     #3a5070;
      --text:      #c8dff0;
      --text-dim:  #5a7a9a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas#stars {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .25; z-index: 2;
      animation: scan 6s linear infinite;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

    /* CENTER CARD */
    .card {
      position: relative; z-index: 10;
      width: min(480px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
      animation: fadeUp .7s ease both;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* corner deco */
    .card::before, .card::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
    }
    .card::before {
      top: 7px; right: 7px;
      border-top: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
    }
    .card::after {
      bottom: 7px; left: 7px;
      border-bottom: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .brand {
      font-family: var(--font-head);
      font-size: 13px; font-weight: 900;
      color: #fff; letter-spacing: 2px;
    }
    .brand span { color: var(--accent); }
    .status-pill {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--text-dim);
      letter-spacing: 2px;
    }

    /* BODY */
    .card-body {
      padding: 52px 44px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* ICON RING */
    .icon-ring {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 32px;
      position: relative;
      transition: border-color .4s, box-shadow .4s;
    }
    .icon-ring.loading {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,212,255,.2);
      animation: spin-ring 2s linear infinite;
    }
    .icon-ring.success {
      border-color: var(--green);
      box-shadow: 0 0 24px rgba(0,255,136,.25);
    }
    .icon-ring.error {
      border-color: var(--accent2);
      box-shadow: 0 0 24px rgba(255,69,0,.25);
    }
    .icon-ring.warn {
      border-color: var(--yellow);
      box-shadow: 0 0 24px rgba(255,215,0,.2);
    }
    @keyframes spin-ring {
      0%   { box-shadow: 0 0 0 0 rgba(0,212,255,.4); }
      50%  { box-shadow: 0 0 28px 4px rgba(0,212,255,.15); }
      100% { box-shadow: 0 0 0 0 rgba(0,212,255,.4); }
    }

    /* orbit dot that spins around the ring while loading */
    .orbit-dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      top: -4px; left: calc(50% - 4px);
      transform-origin: 4px 49px;
      animation: orbit 1.2s linear infinite;
      display: none;
    }
    .icon-ring.loading .orbit-dot { display: block; }
    @keyframes orbit { to { transform: rotate(360deg); } }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--accent);
      letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 900;
      color: #fff; line-height: 1.1;
      margin-bottom: 14px;
      transition: color .3s;
    }
    h1.success { color: var(--green); }
    h1.error   { color: var(--accent2); }
    h1.warn    { color: var(--yellow); }

    .message {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-dim);
      line-height: 1.7; max-width: 320px;
      margin-bottom: 36px;
    }

    /* PROGRESS BAR (loading state) */
    .progress-wrap {
      width: 100%;
      height: 2px;
      background: var(--border);
      margin-bottom: 36px;
      display: none;
      overflow: hidden;
    }
    .progress-wrap.show { display: block; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      width: 40%;
      animation: progress-slide 1.2s ease-in-out infinite;
    }
    @keyframes progress-slide {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(350%); }
    }

    /* LOG LINES */
    .log-box {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 32px;
      text-align: left;
      display: none;
    }
    .log-box.show { display: block; }
    .log-line {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.8;
      opacity: 0;
      animation: logFade .3s ease forwards;
    }
    .log-line.ok   { color: var(--green); }
    .log-line.err  { color: var(--accent2); }
    .log-line.warn { color: var(--yellow); }
    @keyframes logFade { to { opacity: 1; } }

    /* ACTION BUTTON */
    .btn {
      font-family: var(--font-head);
      font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      padding: 13px 32px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color .3s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      text-decoration: none;
      display: inline-block;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform .3s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); }
    .btn span { position: relative; z-index: 1; }
    .btn.hidden { display: none; }
    .btn.green-btn {
      border-color: var(--green); color: var(--green);
    }
    .btn.green-btn::before { background: var(--green); }
    .btn.green-btn:hover { color: var(--bg); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="card">
  <div class="top-bar">
    <div class="brand">ORBI<span>TAL</span></div>
    <div class="status-pill">VERIFICATION TERMINAL</div>
  </div>

  <div class="card-body">

    <div class="icon-ring loading" id="iconRing">
      <div class="orbit-dot"></div>
      <span id="iconEmoji">🛰️</span>
    </div>

    <div class="eyebrow">// Identity Check</div>
    <h1 id="title">VERIFYING CREDENTIALS</h1>
    <p class="message" id="message">
      Authenticating your access token against mission control records. Stand by…
    </p>

    <div class="progress-wrap show" id="progressWrap">
      <div class="progress-bar"></div>
    </div>

    <div class="log-box" id="logBox"></div>

    <a href="login.html" class="btn hidden" id="actionBtn">
      <span id="actionText">PROCEED TO LOGIN</span>
    </a>

  </div>
</div>

<script>
  /* STARFIELD */
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + .2,
      o: Math.random(),
      s: Math.random() * .004 + .002
    }));
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(st => {
      st.o += st.s;
      if (st.o > 1 || st.o < 0) st.s *= -1;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${st.o})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resizeCanvas(); initStars(); drawStars();
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  /* LOG HELPER */
  function addLog(text, type = '') {
    const logBox = document.getElementById('logBox');
    logBox.classList.add('show');
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.style.animationDelay = '0s';
    line.textContent = text;
    logBox.appendChild(line);
  }

  /* STATE HELPERS */
  function setSuccess() {
    document.getElementById('iconRing').className  = 'icon-ring success';
    document.getElementById('iconEmoji').textContent = '✓';
    document.getElementById('title').textContent   = 'ACCESS GRANTED';
    document.getElementById('title').className     = 'success';
    document.getElementById('message').textContent = 'Your identity has been confirmed. You are cleared for mission operations.';
    document.getElementById('progressWrap').classList.remove('show');
    const btn = document.getElementById('actionBtn');
    btn.classList.remove('hidden');
    btn.classList.add('green-btn');
    document.getElementById('actionText').textContent = 'PROCEED TO LOGIN';
    btn.href = 'login.html';
  }

  function setError(detail) {
    document.getElementById('iconRing').className  = 'icon-ring error';
    document.getElementById('iconEmoji').textContent = '✕';
    document.getElementById('title').textContent   = 'VERIFICATION FAILED';
    document.getElementById('title').className     = 'error';
    document.getElementById('message').textContent = detail || 'An unknown error occurred. Contact mission support.';
    document.getElementById('progressWrap').classList.remove('show');
    const btn = document.getElementById('actionBtn');
    btn.classList.remove('hidden');
    document.getElementById('actionText').textContent = 'BACK TO REGISTER';
    btn.href = '/create_acc.html';
  }

  function setAlreadyVerified() {
    document.getElementById('iconRing').className  = 'icon-ring warn';
    document.getElementById('iconEmoji').textContent = '⚠';
    document.getElementById('title').textContent   = 'ALREADY VERIFIED';
    document.getElementById('title').className     = 'warn';
    document.getElementById('message').textContent = 'This account has already been cleared for access. Proceed to login.';
    document.getElementById('progressWrap').classList.remove('show');
    const btn = document.getElementById('actionBtn');
    btn.classList.remove('hidden');
    document.getElementById('actionText').textContent = 'GO TO LOGIN';
    btn.href = '/login.html';
  }

  /* MAIN — read token from URL and verify */
  async function verifyToken() {
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      addLog('[ ERR ] No token found in URL.', 'err');
      setError('No verification token was provided. Please use the link from your email.');
      return;
    }

    addLog('[ ... ] Token detected. Initiating handshake…');

    // small delay so the loading state is visible
    await new Promise(r => setTimeout(r, 800));
    addLog('[ ... ] Contacting auth server…');

    try {
      const response = await fetch(`http://localhost:8000/auth/verify/${token}`, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });

      const data = await response.json();

      await new Promise(r => setTimeout(r, 500));

      if (response.ok) {
        if (data.message === 'Account already verified.') {
          addLog('[ WARN ] Account already verified.', 'warn');
          setAlreadyVerified();
        } else {
          addLog('[ OK ] Token valid. Identity confirmed.', 'ok');
          addLog('[ OK ] is_verified flag updated in database.', 'ok');
          addLog('[ OK ] Clearance level assigned: CADET.', 'ok');
          setSuccess();
        }
      } else {
        addLog(`[ ERR ] ${data.detail}`, 'err');
        setError(data.detail);
      }

    } catch (err) {
      addLog('[ ERR ] Could not reach auth server.', 'err');
      setError('Unable to connect to mission control. Check your connection and try again.');
    }
  }

  verifyToken();
</script>
</body>
</html>
